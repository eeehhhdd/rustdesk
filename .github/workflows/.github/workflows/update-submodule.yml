name: 自动更新hbb_common子模块到最新main
on:
  workflow_dispatch: # 支持网页手动点击运行

permissions:
  contents: write # 必须开启写权限，才能提交代码

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码+递归子模块
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 同步子模块远程地址
        run: git submodule sync

      - name: 更新子模块到fork仓库main最新提交
        run: git submodule update --remote libs/hbb_common

      - name: 提交子模块新哈希并推送
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add libs/hbb_common
          git commit -m "【自动更新】hbb_common同步个人fork最新私有服务器配置"
          git push origin main
