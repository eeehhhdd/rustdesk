name: 自动更新hbb_common子模块到最新master
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码+递归子模块
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 同步子模块远程地址
        run: git submodule sync

      - name: 更新子模块到fork仓库master最新提交
        run: git submodule update --remote libs/hbb_common

      - name: 配置用户信息、提交并推送到master分支
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add libs/hbb_common
          git commit -m "【自动更新】hbb_common同步个人fork最新私有服务器配置"
          # 推送到你仓库真实的默认分支 master
          git push origin master
